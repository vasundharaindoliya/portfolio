<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: white;
}

nav h2 {
    margin: 0;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: black;
}

/* Hero Section */
.hero {
    padding: 60px;
}

.hero h1 {
    font-size: 50px;
    max-width: 600px;
}

/* Grid Section */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    padding: 40px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card h3 {
    padding: 15px;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<nav>
    <h2>Vasundhara</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">
    <h1>Designer crafting brands and websites</h1>
</section>

<section class="grid">

    <div class="card">
        <img src="https://picsum.photos/400/300?1">
        <h3>Project One</h3>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?2">
        <h3>Project Two</h3>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?3">
        <h3>Project Three</h3>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?4">
        <h3>Project Four</h3>
    </div>

</section>

<footer>
    <p>© 2026 Vasundhara</p>
</footer>

</body>
</html>
